# RR8 framework 模式（SSR）+ @netlify/vite-plugin-react-router。
# 构建产出 build/client（静态资源）+ SSR server handler（插件自动接管路由，
# 无需 SPA 回退 /* → index.html）。经典 Functions（生图后台/状态）保留，阶段二接真后台。
[build]
  command = "npm run build"
  publish = "build/client"
  functions = "netlify/functions"

# 本地 `netlify dev`：让其自动探测 React Router（@netlify/vite-plugin-react-router 集成），
# 跑真正的 vite dev（HMR + CSS Modules + tokens 正常注入）+ netlify/functions（生图链路）+ .env。
# 只钉端口 8888（= BETTER_AUTH_URL）；不要设 framework=#custom（会改走「内置 SSR 函数 + 静态 publish」
# 的混合模式，导致 CSS 链接指向构建产物且无 vite client → 页面无样式，local-acceptance.md 已记此坑）。
[dev]
  port = 8888

# ⚡ 静态资源强缓存：Vite 产物已带内容 hash（改动即换名），可安全 immutable 缓存一年。
# 让二次访问命中本地缓存、免跨境重下 JS/CSS，缩短交互就绪时间。HTML/loader 不在此列（默认不强缓存，保证更新即时）。
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 生图 REST：同步入队 /api/generate + 短轮询 /api/generate-status → 经典 Functions（v2 Request 处理器）。
# generate-background 由 generate await 短触发请求，不等待 background job（-background=15min 后台）。
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200
[[redirects]]
  from = "/api/generate-status"
  to = "/.netlify/functions/generate-status"
  status = 200

# ⑦ Scheduled Functions（cron · 真相源 10 §11.1）。时区：cron 用 UTC，「每日 0 点」按北京(UTC+8) 折算为 UTC 16:00。
# 错峰：超时重扫每分钟；旧预算键清理 00:00；积分过期 00:10 → 余额对账 00:30（过期必先于对账，未过期口径才一致）；
# 图片清理 01:00。钱 cron（过期/对账）走 Pool/WS 事务，只读扫描走 HTTP；各 handler try/catch → 告警，绝不静默吞。
[functions."cron-timeout-rescan"]
  schedule = "*/1 * * * *"
[functions."cron-clean-generation-credentials"]
  schedule = "*/5 * * * *"
[functions."cron-budget-cleanup"]
  schedule = "0 16 * * *"
[functions."cron-expire-credits"]
  schedule = "10 16 * * *"
[functions."cron-reconcile-balance"]
  schedule = "30 16 * * *"
[functions."cron-clean-images"]
  schedule = "0 17 * * *"
