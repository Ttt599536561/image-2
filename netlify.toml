# RR8 framework 模式（SSR）+ @netlify/vite-plugin-react-router。
# 构建产出 build/client（静态资源）+ SSR server handler（插件自动接管路由，
# 无需 SPA 回退 /* → index.html）。经典 Functions（生图后台/状态）保留，阶段二接真后台。
[build]
  command = "npm run build"
  publish = "build/client"
  functions = "netlify/functions"

# 生图 REST：同步入队 /api/generate + 短轮询 /api/generate-status → 经典 Functions（v2 Request 处理器）。
# generate-background 由 generate 内部 fire-and-forget 触发（/.netlify/functions/generate-background，-background=15min 后台）。
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200
[[redirects]]
  from = "/api/generate-status"
  to = "/.netlify/functions/generate-status"
  status = 200
