x-app: &app
  build: .
  image: ai-image-workshop:${IMAGE_TAG:-latest}
  env_file:
    - path: deploy/.env.production
      required: false
  restart: unless-stopped
  networks: [app]

services:
  web:
    <<: *app
    command: npm run start:web
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    <<: *app
    command: npm run start:worker
    depends_on:
      web:
        condition: service_healthy

  scheduler:
    <<: *app
    command: npm run start:scheduler
    depends_on:
      web:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks: [app]

networks:
  app:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
