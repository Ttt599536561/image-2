x-app: &app
  build: .
  image: ai-image-workshop:${IMAGE_TAG:-latest}
  env_file:
    - path: deploy/.env.production
      required: false
  restart: unless-stopped
  networks: [app]
  volumes:
    - media_data:/app/data/media

services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_image_workshop}
      POSTGRES_USER: ${POSTGRES_USER:-ai_image_workshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [app]

  web:
    <<: *app
    command: npm run start:web
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_HOST_PORT:-18080}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    <<: *app
    command: npm run start:worker
    depends_on:
      web:
        condition: service_healthy

  scheduler:
    <<: *app
    command: npm run start:scheduler
    depends_on:
      web:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    profiles: [caddy]
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/srv/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks: [app]

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
