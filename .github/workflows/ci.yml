# CI 门禁：依赖高危审计、类型、单测、构建、秘密与 Compose 配置，任一失败阻断合入。
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Dependency audit (high and critical)
        run: npm audit --audit-level=high

      # Biome（lint + format 检查）。当前仓未引 Biome（无 biome.json）→ 自动跳过；引入后此步即生效。
      - name: Biome (if configured)
        run: |
          if [ -f biome.json ] || [ -f biome.jsonc ]; then
            npx --no-install @biomejs/biome ci .
          else
            echo "未配置 Biome（无 biome.json），跳过"
          fi

      # 类型检查：react-router typegen 生成 +types 后 tsc --noEmit。
      - name: Typecheck
        run: npm run typecheck

      # 前端单测（jsdom；钱链路 test:money 需对真 Neon 分支，见末尾 TODO，未进默认 CI）。
      - name: Unit tests
        run: npm run test:run

      # 构建（server 模块懒读 env，build 不需真密钥）。
      - name: Build
        run: npm run build

      # 构建期密钥断言：扫 build/client 无密钥值/无 db schema 结构泄露。
      # CI 注入的 secrets 用于「值」匹配；未注入则仅扫结构标记（仍硬挡 schema 泄露）。
      - name: Assert no secrets in bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          RELAY_API_KEY: ${{ secrets.RELAY_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          STORAGE_S3_ACCESS_KEY_ID: ${{ secrets.STORAGE_S3_ACCESS_KEY_ID }}
          STORAGE_S3_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_S3_SECRET_ACCESS_KEY }}
        run: node --import tsx scripts/assert-no-secrets-in-bundle.ts

      - name: Validate Docker Compose
        run: npm run docker:validate

      - name: Deployment script contract tests
        timeout-minutes: 5
        run: npm run test:deploy

      - name: Build Docker image
        run: docker build --tag ai-image-workshop:ci .

      - name: Validate Docker runtime dependencies
        run: |
          docker run --rm ai-image-workshop:ci node -e "
            const fs = require('node:fs');
            const required = ['tsx', 'better-auth', '@react-router/serve', '.bin/react-router-serve'];
            const forbidden = ['drizzle-kit', 'vitest', 'vite', '@esbuild-kit/core-utils'];
            for (const name of required) {
              if (!fs.existsSync('/app/node_modules/' + name)) throw new Error('Missing runtime dependency: ' + name);
            }
            for (const name of forbidden) {
              if (fs.existsSync('/app/node_modules/' + name)) throw new Error('Unexpected runtime dependency: ' + name);
            }
            if (require('/app/package.json').devDependencies) throw new Error('Runtime manifest still has devDependencies');
            console.log('Docker runtime dependency boundary is valid');
          "

      - name: Empty self-hosted stack smoke
        timeout-minutes: 10
        env:
          IMAGE_TAG: ci
        run: npm run test:deploy:smoke

